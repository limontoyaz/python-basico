[pytest]
# ──────────────────────────────────────────────
# Configuración de pytest para este proyecto
# ──────────────────────────────────────────────

# Carpeta donde están los tests
testpaths = tests

# Permite importar módulos desde src sin instalar el paquete
pythonpath = src

# Mostrar prints y salidas durante los tests
addopts = -v --tb=short

# Marcas personalizadas (evita advertencias de marks desconocidos)
markers =
    lento: tests que tardan más tiempo (ejecutar con pytest -m lento)
    integracion: tests de integración entre módulos
